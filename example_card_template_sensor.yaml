    heading: Example using template sensor
    heading_style: title
  - type: tile
    grid_options:
      columns: 12
      rows: 1
    entity: sensor.cheapest_great_western_highway
    icon: mdi:gas-station
    state_content:
      - state
      - station_name
    vertical: false
    features_position: bottom
